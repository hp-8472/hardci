name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e '.[dev,can]'

      - name: Lint
        run: ruff check src tests

      - name: Run tests
        run: pytest

      - name: Check package build
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

  audit:
    name: Production dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip

      - name: Install production dependencies
        run: python -m pip install '.[can,pyocd]'

      - name: Audit production dependencies
        run: |
          python -m pip install pip-audit
          pip-audit

  required-ci:
    name: Required CI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - test
      - audit
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        shell: bash
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Python test matrix finished with ${{ needs.test.result }}"
            exit 1
          fi
          if [[ "${{ needs.audit.result }}" != "success" ]]; then
            echo "Dependency audit finished with ${{ needs.audit.result }}"
            exit 1
          fi
