name: Publish PyPI package

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/hardci
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install build twine

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "${RELEASE_TAG#v}" != "${version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match project version ${version}" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release-assets:
    name: Attach SBOM and attestations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'release'
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install build cyclonedx-bom

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "${RELEASE_TAG#v}" != "${version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match project version ${version}" >&2
            exit 1
          fi

      - name: Build distributions
        run: python -m build

      - name: Generate SBOM
        run: |
          python -m venv sbom-env
          sbom-env/bin/pip install dist/*.whl
          cyclonedx-py environment --output-format JSON --output-file sbom.cdx.json sbom-env/bin/python

      - name: Attest distributions
        id: attest-dists
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Attest SBOM
        id: attest-sbom
        uses: actions/attest@v4
        with:
          subject-path: dist/*
          sbom-path: sbom.cdx.json

      - name: Stage release attestation assets
        run: |
          set -euo pipefail
          cp "${{ steps.attest-dists.outputs.bundle-path }}" hardci-dists.intoto.jsonl
          cp "${{ steps.attest-sbom.outputs.bundle-path }}" hardci-dists.sbom.intoto.jsonl

      - name: Upload distributions, SBOM, and attestations
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* sbom.cdx.json ./*.intoto.jsonl --repo "$GITHUB_REPOSITORY" --clobber
